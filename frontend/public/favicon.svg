<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g transform="rotate(30 50 50)">
    <!-- Base dark sphere (night side) -->
    <circle cx="50" cy="50" r="48" fill="#111111"/>
    
    <!-- Layer 1 -->
    <path d="M 50 2 A 48 48 0 0 0 50 98 A 36 48 0 0 1 50 2 Z" fill="#222222"/>
    
    <!-- Layer 2 -->
    <path d="M 50 2 A 36 48 0 0 0 50 98 A 22 48 0 0 1 50 2 Z" fill="#3D3D3D"/>
    
    <!-- Layer 3 -->
    <path d="M 50 2 A 22 48 0 0 0 50 98 A 8 48 0 0 1 50 2 Z" fill="#666666"/>
    
    <!-- Layer 4 (brightest edge/day side) -->
